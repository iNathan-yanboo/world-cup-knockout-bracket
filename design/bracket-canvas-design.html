<!doctype html>
<!--
  设计迭代说明：
  - 本文件是高保真设计稿，不是生产页面。
  - 首轮拆为左右两翼，避免 32 强全部挤在单侧。
  - 中央冠军卡承接左右半区的半决赛胜者，后续生产实现可复用同一比赛图谱。
-->
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>世界杯淘汰赛晋级画布设计稿</title>
    <style>
      :root {
        color-scheme: light;
        --grass-50: #f6fbf3;
        --grass-100: #e7f3df;
        --grass-200: #d3e9c9;
        --grass-500: #2c8650;
        --grass-700: #174f31;
        --chalk: #ffffff;
        --ink: #13221c;
        --muted: #6a7a71;
        --line: rgba(44, 134, 80, 0.34);
        --line-strong: #25834c;
        --gold: #d8ab36;
        --gold-deep: #9b6a13;
        --blue: #226aa8;
        --card: rgba(255, 255, 255, 0.94);
        --shadow: 0 18px 46px rgba(23, 79, 49, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 42%, rgba(216, 171, 54, 0.22), transparent 24rem),
          linear-gradient(135deg, #eef8e9 0%, #fbfdf8 48%, #e1f0dc 100%);
      }

      button {
        font: inherit;
      }

      .shell {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(23, 79, 49, 0.12);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
      }

      .title {
        display: grid;
        gap: 3px;
      }

      .eyebrow {
        margin: 0;
        color: var(--grass-700);
        font-size: 0.76rem;
        font-weight: 850;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.55rem, 2.4vw, 2.8rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tool-button,
      .zoom-readout {
        min-height: 40px;
        border: 1px solid rgba(23, 79, 49, 0.16);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        box-shadow: 0 8px 20px rgba(23, 79, 49, 0.08);
      }

      .tool-button {
        min-width: 42px;
        padding: 0 12px;
        cursor: pointer;
      }

      .tool-button:hover {
        border-color: rgba(44, 134, 80, 0.5);
      }

      .zoom-readout {
        display: grid;
        place-items: center;
        min-width: 76px;
        padding: 0 12px;
        color: var(--grass-700);
        font-size: 0.84rem;
        font-weight: 760;
      }

      .viewport {
        position: relative;
        overflow: hidden;
        cursor: grab;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.42) 0 1px, transparent 1px 120px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.42) 0 1px, transparent 1px 120px),
          radial-gradient(circle at center, rgba(255, 255, 255, 0.7), transparent 46rem);
      }

      .viewport.is-dragging {
        cursor: grabbing;
      }

      .field-mark {
        position: absolute;
        inset: 56px;
        border: 2px solid rgba(255, 255, 255, 0.72);
        border-radius: 30px;
        pointer-events: none;
      }

      .center-circle {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 420px;
        height: 420px;
        border: 2px solid rgba(255, 255, 255, 0.64);
        border-radius: 999px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 3400px;
        height: 2000px;
        transform-origin: 0 0;
      }

      .connectors {
        position: absolute;
        inset: 0;
        width: 3400px;
        height: 2000px;
        pointer-events: none;
      }

      .connector {
        fill: none;
        stroke: var(--line);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .connector.is-active {
        stroke: var(--line-strong);
        stroke-width: 4;
      }

      .round-label {
        position: absolute;
        width: 288px;
        color: var(--grass-700);
        font-size: 0.76rem;
        font-weight: 900;
        letter-spacing: 0;
      }

      .round-label.is-right {
        text-align: right;
      }

      .zone-label {
        position: absolute;
        width: 360px;
        color: rgba(23, 79, 49, 0.54);
        font-size: 0.86rem;
        font-weight: 820;
        letter-spacing: 0;
      }

      .match {
        position: absolute;
        width: 288px;
        min-height: 132px;
        border: 1px solid rgba(23, 79, 49, 0.13);
        border-radius: 8px;
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .match.is-next {
        background: rgba(255, 255, 255, 0.86);
      }

      .match-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 11px 14px 8px;
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 860;
      }

      .match-id {
        color: var(--grass-700);
      }

      .teams {
        display: grid;
        gap: 9px;
        padding: 2px 14px 14px;
      }

      .team {
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr) 46px;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        width: 100%;
        border: 1px solid rgba(19, 34, 28, 0.08);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--ink);
        text-align: left;
        cursor: pointer;
      }

      .team:hover:not(:disabled) {
        border-color: rgba(34, 106, 168, 0.45);
        background: #ffffff;
      }

      .team.is-picked {
        border-color: rgba(44, 134, 80, 0.62);
        background: #ebf7ea;
        box-shadow: inset 0 0 0 2px rgba(44, 134, 80, 0.16);
      }

      .team:disabled {
        color: rgba(19, 34, 28, 0.44);
        cursor: default;
      }

      .flag {
        width: 28px;
        height: 20px;
        margin-left: 10px;
        border-radius: 4px;
        object-fit: cover;
        box-shadow: 0 0 0 1px rgba(19, 34, 28, 0.08);
      }

      .placeholder-flag {
        width: 28px;
        height: 20px;
        margin-left: 10px;
        border-radius: 4px;
        background:
          linear-gradient(90deg, transparent 44%, rgba(44, 134, 80, 0.28) 44% 56%, transparent 56%),
          rgba(44, 134, 80, 0.1);
      }

      .team-name {
        overflow-wrap: anywhere;
        font-size: 0.88rem;
        font-weight: 820;
        line-height: 1.16;
      }

      .team-code {
        padding-right: 10px;
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 850;
      }

      .champion-hub {
        position: absolute;
        width: 430px;
        min-height: 450px;
        overflow: visible;
        padding: 248px 28px 28px;
        border: 1px solid rgba(216, 171, 54, 0.46);
        border-radius: 14px;
        background:
          radial-gradient(circle at 50% -12%, rgba(255, 233, 164, 0.84), transparent 12rem),
          radial-gradient(circle at 50% 34%, rgba(216, 171, 54, 0.26), transparent 12rem),
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 251, 234, 0.94));
        box-shadow:
          0 30px 90px rgba(23, 79, 49, 0.25),
          0 0 90px rgba(216, 171, 54, 0.24),
          inset 0 0 0 1px rgba(255, 255, 255, 0.72);
        isolation: isolate;
      }

      .champion-hub::before {
        position: absolute;
        inset: -190px -170px -70px;
        z-index: -1;
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 28%, rgba(255, 220, 118, 0.7), transparent 15rem),
          radial-gradient(circle at 50% 48%, rgba(44, 134, 80, 0.18), transparent 18rem);
        content: "";
        filter: blur(8px);
        pointer-events: none;
      }

      .champion-hub::after {
        position: absolute;
        right: 20px;
        bottom: 20px;
        left: 20px;
        z-index: 2;
        height: 185px;
        border-radius: 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 253, 242, 0.94) 38%),
          rgba(255, 255, 255, 0.72);
        content: "";
        pointer-events: none;
      }

      .trophy-burst {
        position: absolute;
        top: -565px;
        left: 50%;
        z-index: 1;
        width: 620px;
        max-width: none;
        transform: translateX(-50%);
        filter:
          drop-shadow(0 32px 46px rgba(111, 73, 7, 0.34))
          drop-shadow(0 0 34px rgba(255, 226, 129, 0.38));
        pointer-events: none;
        user-select: none;
      }

      .champion-copy {
        position: relative;
        z-index: 3;
      }

      .champion-ring {
        display: grid;
        place-items: center;
        width: 72px;
        height: 72px;
        margin: 0 auto 12px;
        border: 1px solid rgba(216, 171, 54, 0.52);
        border-radius: 999px;
        background:
          radial-gradient(circle, #fffdf0 0 44%, rgba(216, 171, 54, 0.18) 45% 100%);
        color: var(--gold-deep);
        font-size: 1.2rem;
        font-weight: 950;
        letter-spacing: 0;
        box-shadow: 0 12px 28px rgba(155, 106, 19, 0.16);
      }

      .champion-label {
        display: block;
        color: var(--gold-deep);
        font-size: 0.78rem;
        font-weight: 900;
        text-align: center;
      }

      .champion-name {
        display: block;
        margin-top: 10px;
        font-size: 2.75rem;
        font-weight: 950;
        line-height: 1.08;
        text-align: center;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.82);
      }

      .final-slots {
        display: grid;
        gap: 11px;
        margin-top: 22px;
      }

      .final-slot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid rgba(216, 171, 54, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 820;
      }

      .pitch-note {
        position: absolute;
        left: 80px;
        bottom: 70px;
        width: 720px;
        color: rgba(23, 79, 49, 0.62);
        font-size: 0.84rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="title">
          <p class="eyebrow">设计稿 · 左右半区画布</p>
          <h1>世界杯淘汰赛晋级图</h1>
          <p class="subtitle">左右半区向中心冠军汇聚，国旗、连线、拖拽与缩放预览</p>
        </div>
        <div class="toolbar" aria-label="画布控制">
          <button class="tool-button" id="zoom-out" type="button" aria-label="缩小">−</button>
          <span class="zoom-readout" id="zoom-readout">82%</span>
          <button class="tool-button" id="zoom-in" type="button" aria-label="放大">+</button>
          <button class="tool-button" id="reset-view" type="button" aria-label="重置视图">重置视图</button>
        </div>
      </header>

      <section class="viewport" id="viewport" aria-label="淘汰赛画布设计稿">
        <div class="field-mark"></div>
        <div class="center-circle"></div>
        <div class="canvas" id="canvas">
          <svg class="connectors" id="connectors" viewBox="0 0 3400 2000" aria-hidden="true"></svg>
          <div id="nodes"></div>
          <p class="pitch-note">
            设计说明：首轮拆成左右半区后，每一侧只向中心收束，不再跨区交叉；中心冠军卡承担视觉焦点，后续正式页面可以继续保留拖拽、缩放和点击晋级。
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./bracket-canvas-design.js"></script>
  </body>
</html>
