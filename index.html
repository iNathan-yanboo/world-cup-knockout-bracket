<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Interactive 2026 FIFA World Cup knockout bracket."
    >
    <title>2026 World Cup Knockout Bracket</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230d2f26'/%3E%3Cpath d='M18 16h28v10c0 9-5.8 16.1-14 17.7C23.8 42.1 18 35 18 26V16Z' fill='%23d8aa38'/%3E%3Cpath d='M25 48h14v5H25z' fill='%23f7f4ea'/%3E%3Cpath d='M21 53h22v5H21z' fill='%23f7f4ea'/%3E%3C/svg%3E"
    >
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="title-block">
          <p class="eyebrow">2026 FIFA World Cup</p>
          <h1>Knockout Bracket</h1>
          <p class="snapshot-line">Round of 32 to champion</p>
        </div>
        <button id="reset-picks" class="reset-button" type="button">
          Reset
        </button>
      </header>

      <section id="source-root" class="source-panel" aria-label="Data sources"></section>

      <section class="bracket-scroll" aria-label="Interactive bracket">
        <div id="bracket-root"></div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
